name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: w0n9/jenkins-inbound-agent
  GHCR_IMAGE: ghcr.io/w0n9/jenkins-inbound-agent

jobs:
  build:
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.13", "3.14"]
        platform:
          - runner: ubuntu-latest
            arch: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: linux/arm64
    steps:
      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform.arch }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform.arch }}
          build-args: PYTHON_VERSION=${{ matrix.python_version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,"name=${{ env.DOCKERHUB_IMAGE }},${{ env.GHCR_IMAGE }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=py${{ matrix.python_version }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=py${{ matrix.python_version }}-${{ env.PLATFORM_PAIR }},mode=max

      - name: Build only (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform.arch }}
          build-args: PYTHON_VERSION=${{ matrix.python_version }}
          push: false
          cache-from: type=gha,scope=py${{ matrix.python_version }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digest-py${{ matrix.python_version }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        python_version: ["3.13", "3.14"]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-py${{ matrix.python_version }}-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifest and push to Docker Hub
        working-directory: /tmp/digests
        run: |
          TAGS=(-t "${{ env.DOCKERHUB_IMAGE }}:python${{ matrix.python_version }}")
          if [ "${{ matrix.python_version }}" = "3.14" ]; then
            TAGS+=(-t "${{ env.DOCKERHUB_IMAGE }}:latest")
          fi
          docker buildx imagetools create "${TAGS[@]}" \
            $(printf '${{ env.DOCKERHUB_IMAGE }}@sha256:%s ' *)

      - name: Create manifest and push to GHCR
        working-directory: /tmp/digests
        run: |
          TAGS=(-t "${{ env.GHCR_IMAGE }}:python${{ matrix.python_version }}")
          if [ "${{ matrix.python_version }}" = "3.14" ]; then
            TAGS+=(-t "${{ env.GHCR_IMAGE }}:latest")
          fi
          docker buildx imagetools create "${TAGS[@]}" \
            $(printf '${{ env.GHCR_IMAGE }}@sha256:%s ' *)
